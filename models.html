<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Модели — Анастасия</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Archivo:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;background:#fbfaf7;color:#191817;font-family:'Archivo',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
img{display:block;width:100%;height:100%;object-fit:cover}
::selection{background:#191817;color:#fbfaf7}
.wrap{position:relative;z-index:1;max-width:1240px;margin:0 auto;background:transparent}

/* ── анимированные плавные волны на фоне всей страницы ── */
.bgwaves{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
/* цвет блоба плавно перетекает при смене активной модели */
.blob{position:absolute;border-radius:50%;filter:blur(60px);opacity:.8;will-change:transform;transition:background-color 1.4s ease}
.blob.b1{width:64vw;height:64vw;background:#f1e7d3;left:-12vw;top:-10vh;animation:fl1 24s ease-in-out infinite}
.blob.b2{width:56vw;height:56vw;background:#ecdde6;right:-14vw;top:16vh;animation:fl2 28s ease-in-out infinite}
.blob.b3{width:60vw;height:60vw;background:#e5ecdf;left:6vw;bottom:-18vh;animation:fl3 26s ease-in-out infinite}
.blob.b4{width:48vw;height:48vw;background:#f3e2dc;right:4vw;bottom:4vh;animation:fl1 32s ease-in-out infinite reverse}
@keyframes fl1{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(11vw,9vh) scale(1.28)}}
@keyframes fl2{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-10vw,-8vh) scale(1.22)}}
@keyframes fl3{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(9vw,-11vh) scale(1.3)}}
@media(prefers-reduced-motion:reduce){.blob{animation:none!important}}
/* шапка во всю ширину — чёткая полоса поверх волн */
header{position:sticky;top:0;z-index:50;background:rgba(251,250,247,.6);backdrop-filter:blur(22px) saturate(1.8);-webkit-backdrop-filter:blur(22px) saturate(1.8);border-bottom:1px solid rgba(255,255,255,.55);box-shadow:0 8px 30px rgba(30,25,20,.09)}
.hin{max-width:1240px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;padding:20px 46px}
.logo{font-family:'Instrument Serif',serif;font-size:23px;letter-spacing:-.01em}
.back{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.06em;color:rgba(0,0,0,.72);position:relative}
.back::after{content:'';position:absolute;left:0;bottom:-4px;width:0;height:1px;background:rgba(0,0,0,.55);transition:width .35s}
.back:hover::after{width:100%}
.lang{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.06em;display:flex;gap:7px;align-items:center}
.langbtn{cursor:pointer;transition:opacity .2s;background:none;border:0;padding:0;font:inherit;color:inherit}
.langbtn.off{opacity:.35}
.kicker{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:rgba(0,0,0,.4)}

/* ── Hero с «летающими» именами ── */
.mhero{position:relative;padding:80px 46px 70px;min-height:74vh;overflow:hidden}
.mhero .htitle{font-family:'Instrument Serif',serif;font-weight:400;font-size:min(11vw,96px);line-height:1;letter-spacing:-.02em;margin:22px 0 0;max-width:720px}
.mhero .htitle i{font-style:italic}
.mhero .hsub{max-width:420px;margin:26px 0 0;font-size:15px;line-height:1.7;color:rgba(0,0,0,.56)}
.floats{position:absolute;inset:0;z-index:5;pointer-events:none}
@keyframes floaty{0%,100%{transform:translateY(0) rotate(var(--r,0deg))}50%{transform:translateY(-16px) rotate(var(--r,0deg))}}
.fname{position:absolute;pointer-events:auto;font-family:'Instrument Serif',serif;font-style:italic;font-size:clamp(26px,4vw,52px);color:#191817;opacity:.9;white-space:nowrap;cursor:pointer;animation:floaty 6s ease-in-out infinite;transition:opacity .3s,color .3s}
.fname::after{content:'';position:absolute;left:0;bottom:2px;width:100%;height:1px;background:currentColor;opacity:.35;transform:scaleX(0);transform-origin:left;transition:transform .4s}
.fname:hover{opacity:1}
.fname:hover::after{transform:scaleX(1)}
.fnum{font-family:'Space Mono',monospace;font-style:normal;font-size:11px;letter-spacing:.1em;vertical-align:super;opacity:.5;margin-left:6px}

/* ── Секции моделей ── */
.msec{display:grid;grid-template-columns:1fr 1fr;gap:56px;align-items:center;padding:88px 46px;border-top:1px solid rgba(0,0,0,.08);scroll-margin-top:88px}
.msec .mmedia{aspect-ratio:3/4;background:transparent;overflow:visible;opacity:0;transform:translateY(28px);transition:opacity 1s cubic-bezier(.2,.7,.2,1),transform 1s cubic-bezier(.2,.7,.2,1)}
.msec .mmedia img{object-fit:contain}
.msec .minfo{opacity:0;transform:translateY(28px);transition:opacity 1s cubic-bezier(.2,.7,.2,1) .12s,transform 1s cubic-bezier(.2,.7,.2,1) .12s}
.msec.in .mmedia,.msec.in .minfo{opacity:1;transform:none}
.msec.rev .mmedia{order:2}
.mmedia img{transition:transform 1.4s cubic-bezier(.2,.7,.2,1)}
.msec:hover .mmedia img{transform:scale(1.045)}
.mnum{font-family:'Space Mono',monospace;font-size:12px;letter-spacing:.1em;color:rgba(0,0,0,.35)}
.mname{font-family:'Instrument Serif',serif;font-weight:400;font-size:min(9vw,62px);line-height:1;letter-spacing:-.02em;margin:14px 0 0}
.mrole{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:rgba(0,0,0,.5);margin-top:16px}
.mmeta{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.04em;color:rgba(0,0,0,.42);margin-top:6px}
.mbody{font-size:15px;line-height:1.85;color:rgba(0,0,0,.62);margin-top:22px;max-width:440px}
.mbody p{margin:0 0 15px}.mbody p:last-child{margin:0}
.mtags{display:flex;flex-wrap:wrap;gap:8px;margin-top:24px}
.mtag{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:rgba(0,0,0,.55);border:1px solid rgba(0,0,0,.16);border-radius:100px;padding:6px 12px}

.mcontact{padding:100px 46px;text-align:center;border-top:1px solid rgba(0,0,0,.08)}
.mcontact h2{font-family:'Instrument Serif',serif;font-weight:400;font-size:min(8vw,52px);margin:0 0 26px;line-height:1.05}
.mcontact h2 i{font-style:italic}
.clink{position:relative;display:inline-block}
.clink::after{content:'';position:absolute;left:0;bottom:-2px;width:100%;height:1px;background:currentColor;opacity:.4;transform:scaleX(0);transform-origin:left;transition:transform .4s}
.clink:hover::after{transform:scaleX(1)}
footer{padding:24px 46px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px;font-family:'Space Mono',monospace;font-size:11px;color:rgba(0,0,0,.4)}
@media(max-width:820px){
  .msec{grid-template-columns:1fr;gap:24px;padding:54px 22px}
  .msec.rev .mmedia{order:0}
  .hin{padding:18px 22px}
  .mhero{padding:44px 22px 24px;min-height:auto}
  /* на узких экранах имена не летают, а стоят кликабельным списком */
  .floats{position:static;display:flex;flex-wrap:wrap;gap:14px 24px;margin-top:28px}
  .fname{position:static!important;animation:none;font-size:32px}
  .fname .fnum{font-size:10px}
  .mname{font-size:44px}
  .mcontact{padding:64px 22px}
  footer{padding:22px}
}
@media(prefers-reduced-motion:reduce){.fname{animation:none}}
/* ── переход между страницами + кнопка «наверх» ── */
@keyframes pageIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
body{animation:pageIn .55s cubic-bezier(.2,.7,.2,1) both}
html.exit body{opacity:0;transform:translateY(-16px);transition:opacity .38s ease,transform .4s cubic-bezier(.2,.7,.2,1)}
.totop{position:fixed;right:22px;bottom:22px;z-index:60;width:46px;height:46px;border-radius:50%;border:1px solid rgba(0,0,0,.12);background:rgba(251,250,247,.7);backdrop-filter:blur(14px) saturate(1.6);-webkit-backdrop-filter:blur(14px) saturate(1.6);box-shadow:0 8px 24px rgba(30,25,20,.12);cursor:pointer;color:#191817;font-family:'Space Mono',monospace;font-size:16px;display:flex;align-items:center;justify-content:center;opacity:0;transform:translateY(14px) scale(.9);pointer-events:none;transition:opacity .4s,transform .4s,background .3s,color .3s}
.totop.show{opacity:1;transform:none;pointer-events:auto}
.totop:hover{background:#191817;color:#fbfaf7;border-color:#191817}
@media(prefers-reduced-motion:reduce){body{animation:none}html.exit body{transition:none;opacity:1;transform:none}}
</style>
</head>
<body>
<div class="bgwaves" aria-hidden="true"><span class="blob b1"></span><span class="blob b2"></span><span class="blob b3"></span><span class="blob b4"></span></div>

<header>
  <div class="hin">
    <a href="index.html" class="logo">Анастасия</a>
    <a href="index.html#work" class="back" data-ui="back">← Работы</a>
    <div class="lang">
      <button class="langbtn" data-lang="ru">RU</button><span style="opacity:.3">/</span><button class="langbtn off" data-lang="en">EN</button>
    </div>
  </div>
</header>

<div class="wrap">

<section class="mhero">
  <div class="kicker" data-ui="kicker">Muses</div>
  <h1 class="htitle" data-ui="title">Лица за<br><i>кадрами</i></h1>
  <p class="hsub" data-ui="sub">Повторяющиеся образы-музы моих серий. Кликни по имени — плавно перенесёт к её описанию.</p>
  <div class="floats" id="floats"></div>
</section>

<main id="secs"></main>

<section class="mcontact">
  <div class="kicker" data-ui="ckicker">Открыта для заказов</div>
  <h2 data-ui="ctitle">Нужен свой <i>образ</i>?</h2>
  <a href="mailto:hello@anastasia.art" class="clink mono" style="font-family:'Space Mono',monospace;font-size:15px;letter-spacing:.04em">hello@anastasia.art</a>
</section>

<footer>
  <span>© 2026 Анастасия</span>
  <span data-ui="footer">Генеративные изображения · Москва</span>
</footer>

</div>

<script src="models.js"></script>
<script>
(function () {
  var UI = {
    ru: { back: "← Работы", kicker: "Музы", title: "Лица за\n<i>кадрами</i>", sub: "Повторяющиеся образы-музы моих серий. Кликни по имени — плавно перенесёт к её описанию.", ckicker: "Открыта для заказов", ctitle: "Нужен свой <i>образ</i>?", footer: "Генеративные изображения · Москва" },
    en: { back: "← Work",   kicker: "Muses", title: "Faces behind\n<i>the frames</i>", sub: "Recurring muses of my series. Tap a name — it glides you to her story.", ckicker: "Available for commissions", ctitle: "Want your own <i>character</i>?", footer: "Generative imagery · Moscow" }
  };
  // позиции «летающих» имён (проценты). Правая + нижняя зоны — не пересекать заголовок слева-сверху
  var POS = [{ l: 66, t: 14, r: -3 }, { l: 80, t: 45, r: 3 }, { l: 62, t: 72, r: -2 }, { l: 33, t: 86, r: 2 }, { l: 86, t: 74, r: 4 }];
  var lang = (new RegExp("[?&]lang=(en)").test(location.search)) ? "en" : "ru";
  var MODELS = window.MODELS || [];

  function esc(s) { return String(s == null ? "" : s).replace(/[&<>"]/g, function (c) { return ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" })[c]; }); }
  function pad(i) { return ("0" + i).slice(-2); }

  function buildFloats() {
    var box = document.getElementById("floats");
    box.innerHTML = MODELS.map(function (m, i) {
      var p = POS[i % POS.length];
      return '<a class="fname" href="#' + esc(m.id) + '" style="left:' + p.l + "%;top:" + p.t + "%;--r:" + p.r + "deg;animation-delay:" + (i * -1.3).toFixed(1) + 's">' +
        esc(m.name) + '<span class="fnum">' + pad(i + 1) + "</span></a>";
    }).join("");
  }

  function buildSecs() {
    var main = document.getElementById("secs");
    main.innerHTML = MODELS.map(function (m, i) {
      var rev = (i % 2 === 1) ? " rev" : "";
      return '<section class="msec' + rev + '" id="' + esc(m.id) + '">' +
        '<div class="mmedia"><img src="' + esc(m.image) + '" alt="' + esc(m.name) + '"></div>' +
        '<div class="minfo">' +
          '<div class="mnum">' + pad(i + 1) + " / " + pad(MODELS.length) + "</div>" +
          '<h2 class="mname">' + esc(m.name) + "</h2>" +
          '<div class="mrole"></div><div class="mmeta"></div>' +
          '<div class="mbody"></div><div class="mtags"></div>' +
        "</div>" +
      "</section>";
    }).join("");
  }

  function applyLang() {
    document.documentElement.lang = lang;
    document.querySelectorAll("[data-ui]").forEach(function (el) {
      var v = UI[lang][el.getAttribute("data-ui")];
      if (v != null) el.innerHTML = v.replace(/\n/g, "<br>");
    });
    document.querySelectorAll(".langbtn").forEach(function (b) {
      b.classList.toggle("off", b.getAttribute("data-lang") !== lang);
    });
    MODELS.forEach(function (m) {
      var t = m[lang] || m.ru;
      var sec = document.getElementById(m.id);
      if (!sec) return;
      sec.querySelector(".mrole").textContent = t.role || "";
      sec.querySelector(".mmeta").textContent = t.meta || "";
      sec.querySelector(".mbody").innerHTML = (t.body || []).map(function (p) { return "<p>" + esc(p) + "</p>"; }).join("");
      sec.querySelector(".mtags").innerHTML = (t.tags || []).map(function (x) { return '<span class="mtag">' + esc(x) + "</span>"; }).join("");
    });
    // прокинуть язык в ссылки-имена
    document.querySelectorAll(".fname").forEach(function (a) {
      a.setAttribute("href", a.getAttribute("href").split("?")[0]);
    });
  }

  // фон-волны перекрашиваются в палитру активной модели
  function observePalette() {
    var DEFP = ["#f1e7d3", "#ecdde6", "#e5ecdf", "#f3e2dc"];  // нейтраль (hero)
    var blobs = [].slice.call(document.querySelectorAll(".blob"));
    function setP(cols) { blobs.forEach(function (b, i) { b.style.backgroundColor = cols[i % cols.length]; }); }
    setP(DEFP);
    if (!("IntersectionObserver" in window)) return;
    // активна лишь секция, пересекающая центральную полосу экрана;
    // наверху (hero) в полосе ничего нет → держим нейтраль
    var vis = {};
    var io = new IntersectionObserver(function (entries) {
      entries.forEach(function (e) { vis[e.target.id] = e.isIntersecting; });
      var cols = DEFP;
      for (var i = 0; i < MODELS.length; i++) { if (vis[MODELS[i].id]) { cols = MODELS[i].palette || DEFP; break; } }
      setP(cols);
    }, { rootMargin: "-45% 0px -45% 0px", threshold: 0 });
    document.querySelectorAll(".msec").forEach(function (s) { io.observe(s); });
  }

  function observeReveal() {
    if (!("IntersectionObserver" in window)) {
      document.querySelectorAll(".msec").forEach(function (s) { s.classList.add("in"); });
      return;
    }
    var io = new IntersectionObserver(function (entries) {
      entries.forEach(function (e) { if (e.isIntersecting) { e.target.classList.add("in"); io.unobserve(e.target); } });
    }, { threshold: 0.18 });
    document.querySelectorAll(".msec").forEach(function (s) { io.observe(s); });
  }

  document.querySelectorAll(".langbtn").forEach(function (b) {
    b.addEventListener("click", function () {
      lang = b.getAttribute("data-lang");
      applyLang();
      history.replaceState(null, "", "?lang=" + lang);
    });
  });

  buildFloats();
  buildSecs();
  applyLang();
  observeReveal();
  observePalette();
})();
</script>

<button class="totop" id="totop" aria-label="Наверх" title="Наверх">↑</button>
<script>
(function () {
  var reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion:reduce)').matches;
  var btn = document.getElementById('totop');
  function onScroll() { if (btn) btn.classList.toggle('show', window.pageYOffset > 560); }
  window.addEventListener('scroll', onScroll, { passive: true }); onScroll();
  if (btn) btn.addEventListener('click', function () { window.scrollTo({ top: 0, behavior: reduce ? 'auto' : 'smooth' }); });

  function pageLink(a) {
    var href = a.getAttribute('href') || '';
    if (!href || href.charAt(0) === '#') return false;
    if (/^(mailto:|tel:|https?:)/i.test(href)) return false;
    if (a.target === '_blank') return false;
    return /\.html(\?|#|$)/i.test(href);
  }
  document.addEventListener('click', function (e) {
    var a = e.target.closest ? e.target.closest('a') : null;
    if (!a || !pageLink(a)) return;
    if (e.defaultPrevented || e.metaKey || e.ctrlKey || e.shiftKey || e.altKey || e.button) return;
    e.preventDefault();
    var url = a.href;
    if (reduce) { window.location.href = url; return; }
    document.body.style.animation = 'none';
    document.documentElement.classList.add('exit');
    setTimeout(function () { window.location.href = url; }, 360);
  });
  window.addEventListener('pageshow', function (e) {
    if (e.persisted) { document.documentElement.classList.remove('exit'); document.body.style.animation = ''; }
  });
})();
</script>
</body>
</html>
