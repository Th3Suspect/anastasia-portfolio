<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Проект — Анастасия</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Archivo:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;background:#fbfaf7;color:#191817;font-family:'Archivo',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
img{display:block;width:100%;height:auto}
::selection{background:#191817;color:#fbfaf7}
.wrap{max-width:1240px;margin:0 auto;background:#fbfaf7}
@keyframes rise{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.rise{animation:rise 1s cubic-bezier(.2,.7,.2,1) both}
.d1{animation-delay:.05s}.d2{animation-delay:.14s}.d3{animation-delay:.24s}
header{position:sticky;top:0;z-index:50;display:flex;justify-content:space-between;align-items:center;padding:22px 46px;background:rgba(251,250,247,.6);backdrop-filter:blur(22px) saturate(1.8);-webkit-backdrop-filter:blur(22px) saturate(1.8);border-bottom:1px solid rgba(255,255,255,.55);box-shadow:0 8px 30px rgba(30,25,20,.09)}
.logo{font-family:'Instrument Serif',serif;font-size:23px;letter-spacing:-.01em}
.back{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.06em;color:rgba(0,0,0,.6);position:relative}
.back::after{content:'';position:absolute;left:0;bottom:-4px;width:0;height:1px;background:rgba(0,0,0,.55);transition:width .35s}
.back:hover::after{width:100%}
.lang{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.06em;display:flex;gap:7px;align-items:center}
.langbtn{cursor:pointer;transition:opacity .2s;background:none;border:0;padding:0;font:inherit;color:inherit}
.langbtn.off{opacity:.35}
.detail{display:grid;grid-template-columns:1.1fr .9fr;gap:56px;padding:64px 46px 96px;align-items:start}
.detail .media{background:#eceae4;overflow:hidden}
.detail .media img{object-fit:cover}
.kicker{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:rgba(0,0,0,.4)}
.detail h1{font-family:'Instrument Serif',serif;font-weight:400;font-size:min(9vw,64px);line-height:1;letter-spacing:-.02em;margin:18px 0 0}
.detail h1 i{font-style:italic}
.meta{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.04em;color:rgba(0,0,0,.5);margin-top:20px}
.lead{font-size:17px;line-height:1.7;color:rgba(0,0,0,.72);margin-top:26px;max-width:440px}
.body{font-size:15px;line-height:1.85;color:rgba(0,0,0,.62);margin-top:22px;max-width:440px}
.body p{margin:0 0 16px}.body p:last-child{margin:0}
.tags{display:flex;flex-wrap:wrap;gap:8px;margin-top:30px}
.tag{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:rgba(0,0,0,.55);border:1px solid rgba(0,0,0,.16);border-radius:100px;padding:6px 12px}
/* ── Details carousel ── */
.gallery{padding:8px 46px 40px}
.galhd{display:flex;justify-content:space-between;align-items:baseline;border-top:1px solid rgba(0,0,0,.14);padding-top:20px;margin-bottom:22px}
.galhd .gt{font-family:'Instrument Serif',serif;font-size:26px}
.galhd .gcount{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.06em;color:rgba(0,0,0,.4)}
/* двухколоночные «Детали»: слева вертикальная карусель, справа текст на кадр */
.dwrap{display:grid;grid-template-columns:minmax(0,1.12fr) .88fr;gap:40px;align-items:stretch}
/* ── левая: сцена изображения (вертикальная) ── */
.cstage{position:relative;overflow:hidden;background:#0e0d0c;height:min(82vh,720px)}
.track{display:flex;height:100%;transition:transform .95s cubic-bezier(.22,.61,.18,1)}
.slide{position:relative;flex:0 0 100%;height:100%;overflow:hidden;display:flex;align-items:center;justify-content:center}
.slide .bg{position:absolute;inset:0;background-size:cover;background-position:center;filter:blur(34px) brightness(.7) saturate(1.15);transform:scale(1.2);z-index:0}
.slide .ph{position:relative;z-index:1;max-width:100%;max-height:100%;width:auto;height:auto;object-fit:contain;transform:scale(1.05);transition:transform 1.2s cubic-bezier(.2,.7,.2,1);box-shadow:0 24px 70px rgba(0,0,0,.45)}
.slide.active .ph{transform:scale(1)}
/* ── правая: текстовая панель ── */
.cpanel{display:flex;flex-direction:column;justify-content:center;padding:6px 2px}
.cnum{font-family:'Instrument Serif',serif;font-size:64px;line-height:1;color:#191817}
.cnum .cn{display:inline-block}
@keyframes numin{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
.cnum .cn.anim{animation:numin .55s cubic-bezier(.2,.7,.2,1)}
.cnum .ctot{font-family:'Space Mono',monospace;font-size:12px;color:rgba(0,0,0,.4);margin-left:10px;letter-spacing:.06em}
.cnotes{position:relative;margin-top:22px;min-height:190px}
/* текст кадра — уходит быстро, входит с задержкой и стаггером (без нахлёста) */
.cnote{position:absolute;inset:0;pointer-events:none}
.cnote.active{pointer-events:auto}
.cnote .cnt,.cnote .cnp{opacity:0;transform:translateY(16px);filter:blur(2px);will-change:opacity,transform;transition:opacity .3s ease,transform .3s ease,filter .3s ease}
.cnote.active .cnt{opacity:1;transform:none;filter:blur(0);transition:opacity .7s ease .16s,transform .8s cubic-bezier(.2,.7,.2,1) .16s,filter .7s ease .16s}
.cnote.active .cnp{opacity:1;transform:none;filter:blur(0);transition:opacity .7s ease .26s,transform .8s cubic-bezier(.2,.7,.2,1) .26s,filter .7s ease .26s}
.cnote .cnt{font-family:'Instrument Serif',serif;font-size:26px;line-height:1.12}
.cnote .cnp{font-size:14.5px;line-height:1.75;color:rgba(0,0,0,.6);margin:14px 0 0;max-width:360px}
.cnav{display:flex;align-items:center;gap:14px;margin-top:36px}
.cbtn{width:46px;height:46px;border-radius:50%;border:1px solid rgba(0,0,0,.18);cursor:pointer;background:transparent;font-family:'Space Mono',monospace;font-size:16px;color:#191817;display:flex;align-items:center;justify-content:center;transition:background .3s,color .3s,border-color .3s}
.cbtn:hover{background:#191817;color:#fbfaf7;border-color:#191817}
.dots{display:flex;gap:8px;margin-left:auto}
.dot{width:7px;height:7px;border-radius:50%;border:0;padding:0;cursor:pointer;background:rgba(0,0,0,.18);transition:background .3s,transform .3s}
.dot.on{background:#191817;transform:scale(1.25)}
@media(max-width:820px){.dwrap{grid-template-columns:1fr;gap:22px}.cstage{height:min(74vh,560px)}.cnotes{min-height:120px}.cnum{font-size:48px}}
.nextrow{display:flex;justify-content:space-between;align-items:center;padding:34px 46px 90px;border-top:1px solid rgba(0,0,0,.12);margin-top:20px}
.nextrow .cta{position:relative;display:inline-block;font-family:'Instrument Serif',serif;font-size:30px}
.nextrow a .cta::after{content:'';position:absolute;left:0;bottom:-4px;width:100%;height:1px;background:currentColor;opacity:.35;transform:scaleX(0);transform-origin:left;transition:transform .4s}
@media(hover:hover){.nextrow a:hover .cta::after{transform:scaleX(1)}}
.missing{padding:120px 46px;text-align:center;font-family:'Space Mono',monospace;color:rgba(0,0,0,.5)}
footer{padding:24px 46px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px;font-family:'Space Mono',monospace;font-size:11px;color:rgba(0,0,0,.4)}
@media(max-width:820px){.detail{grid-template-columns:1fr;gap:28px;padding:36px 22px 60px}.extra{grid-template-columns:1fr;padding:0 22px 30px}header{padding:18px 22px}.detail h1{font-size:44px}.nextrow{flex-direction:column;align-items:stretch;padding:26px 22px 64px;gap:20px}.nextrow a{display:block}.nextrow a:last-child{text-align:right}.nextrow .cta{font-size:20px}.gallery{padding:8px 22px 40px}.cpanel{padding:4px 0}}
/* ── плавная шторка перехода + кнопка «наверх» ── */
.pfade{position:fixed;inset:0;z-index:200;background:#fbfaf7;opacity:0;pointer-events:none;animation:pfadeOut .5s ease both}
@keyframes pfadeOut{from{opacity:1}to{opacity:0}}
.totop{position:fixed;right:22px;bottom:22px;z-index:60;width:46px;height:46px;border-radius:50%;border:1px solid rgba(0,0,0,.12);background:rgba(251,250,247,.7);backdrop-filter:blur(14px) saturate(1.6);-webkit-backdrop-filter:blur(14px) saturate(1.6);box-shadow:0 8px 24px rgba(30,25,20,.12);cursor:pointer;color:#191817;font-family:'Space Mono',monospace;font-size:16px;display:flex;align-items:center;justify-content:center;opacity:0;transform:translateY(14px) scale(.9);pointer-events:none;transition:opacity .4s,transform .4s,background .3s,color .3s}
.totop.show{opacity:1;transform:none;pointer-events:auto}
.totop:hover{background:#191817;color:#fbfaf7;border-color:#191817}
@media(prefers-reduced-motion:reduce){.pfade{animation:none;opacity:0}}
</style>
</head>
<body>
<div class="wrap">

<header>
  <a href="index.html" class="logo">Анастасия</a>
  <a href="index.html#work" class="back" data-i18n="back">← Все работы</a>
  <div class="lang">
    <button class="langbtn" data-lang="ru">RU</button><span style="opacity:.3">/</span><button class="langbtn off" data-lang="en">EN</button>
  </div>
</header>

<main id="app">
  <div class="missing" data-i18n="loading">Загрузка…</div>
</main>

<footer>
  <span>© 2026 Анастасия</span>
  <span data-i18n="footer">Генеративные изображения · Москва</span>
</footer>

</div>

<script>
(function () {
  // строки самой страницы (не проекта) — RU / EN
  var UI = {
    ru: { back: "← Все работы", loading: "Загрузка…", notfound: "Проект не найден", next: "Следующая работа →", details: "Детали", footer: "Генеративные изображения · Москва" },
    en: { back: "← All work",   loading: "Loading…",  notfound: "Project not found", next: "Next work →",        details: "Details", footer: "Generative imagery · Moscow" }
  };
  // порядок работ = порядок в галерее (для ссылки «следующая»)
  var ORDER = ["elevator", "w5", "w2", "w7", "w1", "w3", "w4", "w6"];
  var VALID = /^[A-Za-z0-9_-]+$/;  // id = имя файла в projects/, без путей

  function param(name) {
    var m = new RegExp("[?&]" + name + "=([^&]+)").exec(location.search);
    return m ? decodeURIComponent(m[1]) : null;
  }

  var id = param("id");
  var lang = (param("lang") === "en") ? "en" : "ru";
  var app = document.getElementById("app");
  var CAR = null;  // активный карусель для клавиш ← →

  document.addEventListener("keydown", function (e) {
    if (!CAR) return;
    if (e.key === "ArrowLeft") CAR.prev();
    else if (e.key === "ArrowRight") CAR.next();
  });

  function setLangButtons() {
    document.querySelectorAll(".langbtn").forEach(function (b) {
      b.classList.toggle("off", b.getAttribute("data-lang") !== lang);
    });
  }

  function renderUI() {
    document.documentElement.lang = lang;
    document.querySelectorAll("[data-i18n]").forEach(function (el) {
      var k = el.getAttribute("data-i18n");
      if (UI[lang][k] != null) el.textContent = UI[lang][k];
    });
    setLangButtons();
  }

  function esc(s) { return String(s).replace(/[&<>"]/g, function (c) { return ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" })[c]; }); }

  function render(p) {
    var t = p[lang] || p.ru;
    var idx = ORDER.indexOf(p.id);
    var next = ORDER[(idx + 1) % ORDER.length];

    var tags = (t.tags || []).map(function (x) { return '<span class="tag">' + esc(x) + "</span>"; }).join("");
    var body = (t.body || []).map(function (x) { return "<p>" + esc(x) + "</p>"; }).join("");

    // gallery: p.gallery — пути (общие); t.captions — заголовок кадра; t.notes — текст кадра (по индексу)
    var caps = t.captions || [];
    var notes = t.notes || [];
    var items = (p.gallery || []).map(function (src, i) {
      return { src: src, cap: caps[i] || "", note: notes[i] || "" };
    });
    var carousel = "";
    if (items.length) {
      var n = items.length, pad = ("0" + n).slice(-2);
      var slides = items.map(function (g) {
        return '<div class="slide">' +
          '<div class="bg" style="background-image:url(\'' + esc(g.src) + '\')"></div>' +
          '<img class="ph" src="' + esc(g.src) + '" alt=""></div>';
      }).join("");
      // правая панель: по одному текст-блоку на кадр, кроссфейд по .active
      var noteEls = items.map(function (g) {
        return '<div class="cnote">' +
          (g.cap ? '<div class="cnt">' + esc(g.cap) + "</div>" : "") +
          (g.note ? '<p class="cnp">' + esc(g.note) + "</p>" : "") + "</div>";
      }).join("");
      var dots = items.map(function (_, i) { return '<button class="dot" data-i="' + i + '" aria-label="' + (i + 1) + '"></button>'; }).join("");
      carousel =
        '<section class="gallery">' +
          '<div class="galhd"><span class="gt">' + esc(UI[lang].details) + "</span></div>" +
          '<div class="dwrap">' +
            '<div class="cstage"><div class="track">' + slides + "</div></div>" +
            '<div class="cpanel">' +
              '<div class="cnum"><span class="cn">01</span><span class="ctot">/ ' + pad + "</span></div>" +
              '<div class="cnotes">' + noteEls + "</div>" +
              (n > 1 ? '<div class="cnav"><button class="cbtn prev" aria-label="prev">←</button><button class="cbtn next" aria-label="next">→</button><div class="dots">' + dots + "</div></div>" : "") +
            "</div>" +
          "</div>" +
        "</section>";
    }

    app.innerHTML =
      '<section class="detail">' +
        '<div class="media rise d1"><img src="' + esc(p.image) + '" alt="' + esc(t.title) + '"></div>' +
        '<div class="info">' +
          '<div class="kicker rise d1">' + esc(p.fig || "") + " · " + esc(t.year || "") + "</div>" +
          '<h1 class="rise d2">' + esc(t.title) + "</h1>" +
          '<div class="meta rise d2">' + esc(t.meta || "") + "</div>" +
          (t.lead ? '<div class="lead rise d3">' + esc(t.lead) + "</div>" : "") +
          '<div class="body rise d3">' + body + "</div>" +
          (tags ? '<div class="tags rise d3">' + tags + "</div>" : "") +
        "</div>" +
      "</section>" +
      carousel +
      '<div class="nextrow">' +
        '<a href="index.html#work"><span class="cta">' + esc(UI[lang].back) + "</span></a>" +
        '<a href="project.html?id=' + esc(next) + "&lang=" + lang + '"><span class="cta">' + esc(UI[lang].next) + "</span></a>" +
      "</div>";

    renderUI();
    if (items.length > 1) initCarousel();
    else if (items.length === 1) {
      var s0 = app.querySelector(".slide"); if (s0) s0.classList.add("active");
      var n0 = app.querySelector(".cnote"); if (n0) n0.classList.add("active");
    }
  }

  function initCarousel() {
    var stage = app.querySelector(".cstage");
    var track = app.querySelector(".track");
    if (!stage || !track) return;
    var slides = [].slice.call(track.children);
    var notes = [].slice.call(app.querySelectorAll(".cnote"));
    var dots = [].slice.call(app.querySelectorAll(".dot"));
    var numEl = app.querySelector(".cn");
    var n = slides.length, cur = 0, timer = null;

    function go(i) {
      cur = (i + n) % n;
      track.style.transform = "translateX(" + (-cur * 100) + "%)";
      slides.forEach(function (s, k) { s.classList.toggle("active", k === cur); });
      notes.forEach(function (nt, k) { nt.classList.toggle("active", k === cur); });  // текст кроссфейдится
      dots.forEach(function (d, k) { d.classList.toggle("on", k === cur); });
      if (numEl) {
        numEl.textContent = ("0" + (cur + 1)).slice(-2);
        numEl.classList.remove("anim"); void numEl.offsetWidth; numEl.classList.add("anim");  // ретриггер плавного появления
      }
    }
    function start() { stop(); timer = setInterval(function () { go(cur + 1); }, 4600); }
    function stop() { if (timer) clearInterval(timer); timer = null; }

    app.querySelector(".prev").addEventListener("click", function () { go(cur - 1); start(); });
    app.querySelector(".next").addEventListener("click", function () { go(cur + 1); start(); });
    dots.forEach(function (d) { d.addEventListener("click", function () { go(+d.getAttribute("data-i")); start(); }); });
    stage.addEventListener("mouseenter", stop);
    stage.addEventListener("mouseleave", start);

    // свайп на тач
    var x0 = null;
    stage.addEventListener("touchstart", function (e) { x0 = e.touches[0].clientX; stop(); }, { passive: true });
    stage.addEventListener("touchend", function (e) {
      if (x0 === null) return;
      var dx = e.changedTouches[0].clientX - x0;
      if (Math.abs(dx) > 40) go(cur + (dx < 0 ? 1 : -1));
      x0 = null; start();
    });
    // текущий карусель — для глобальных клавиш ← →
    CAR = { prev: function () { go(cur - 1); start(); }, next: function () { go(cur + 1); start(); } };

    go(0);
    start();
  }

  function fail() {
    app.innerHTML = '<div class="missing">' + UI[lang].notfound + '<br><br><a class="back" href="index.html#work" style="font-size:12px">' + UI[lang].back + "</a></div>";
    renderUI();
  }

  // переключение языка без перезагрузки данных
  document.querySelectorAll(".langbtn").forEach(function (b) {
    b.addEventListener("click", function () {
      lang = b.getAttribute("data-lang");
      if (window.PROJECT) render(window.PROJECT); else renderUI();
      history.replaceState(null, "", "?id=" + (id || "") + "&lang=" + lang);
    });
  });

  if (!id || !VALID.test(id)) { fail(); return; }

  var s = document.createElement("script");
  s.src = "projects/" + id + ".js";
  s.onload = function () {
    var p = (window.PROJECTS && window.PROJECTS[id]) || window.PROJECT;
    if (p) render(p); else fail();
  };
  s.onerror = fail;
  document.head.appendChild(s);

  renderUI();
})();
</script>

<div class="pfade" aria-hidden="true"></div>
<button class="totop" id="totop" aria-label="Наверх" title="Наверх">↑</button>
<script>
(function () {
  var reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion:reduce)').matches;
  var btn = document.getElementById('totop');
  var fade = document.querySelector('.pfade');
  function onScroll() { if (btn) btn.classList.toggle('show', window.pageYOffset > 560); }
  window.addEventListener('scroll', onScroll, { passive: true }); onScroll();
  if (btn) btn.addEventListener('click', function () { window.scrollTo({ top: 0, behavior: reduce ? 'auto' : 'smooth' }); });

  function pageLink(a) {
    var href = a.getAttribute('href') || '';
    if (!href || href.charAt(0) === '#') return false;
    if (/^(mailto:|tel:|https?:)/i.test(href)) return false;
    if (a.target === '_blank') return false;
    return /\.html(\?|#|$)/i.test(href);
  }
  document.addEventListener('click', function (e) {
    var a = e.target.closest ? e.target.closest('a') : null;
    if (!a || !pageLink(a)) return;
    if (e.defaultPrevented || e.metaKey || e.ctrlKey || e.shiftKey || e.altKey || e.button) return;
    e.preventDefault();
    var url = a.href;
    if (reduce || !fade) { window.location.href = url; return; }
    fade.style.animation = 'none';
    fade.style.transition = 'opacity .32s ease';
    fade.style.opacity = '1';
    setTimeout(function () { window.location.href = url; }, 300);
  });
  window.addEventListener('pageshow', function (e) {
    if (e.persisted && fade) { fade.style.animation = ''; fade.style.transition = ''; fade.style.opacity = ''; }
  });
})();
</script>
</body>
</html>
